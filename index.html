<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Bone Empire</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- REQUIRED: fog layer -->
  <div class="fog-layer"></div>

  <!-- MAIN CONTENT -->
  <div class="container">

    <h1 class="title">☠ THE BONE EMPIRE ☠</h1>

    <p class="subtitle">A NEW EMPIRE RISES FROM THE ASHES</p>

    <button class="enter-btn">ENTER THE EMPIRE</button>

    <div class="status">
      Server Status: <span class="online">ONLINE</span> | Players: 84
    </div>

    <!-- REQUIRED: menu MUST have class="menu" -->
    <div class="menu">
      <button>LEADERBOARDS</button>
      <button>DINO SKINS</button>
      <button>LIVE CHAT</button>
      <button>SERVER MAP</button>
    </div>

  </div>

  <!-- REQUIRED: embers container -->
  <div id="embers"></div>

  
  <script src="script.js"></script>

</body>
</html>
